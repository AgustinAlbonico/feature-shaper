name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binaries
        run: |
          cd tools/feature-shaper
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-windows-amd64.exe ./cmd/feature-shaper
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-windows-arm64.exe ./cmd/feature-shaper
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-linux-amd64 ./cmd/feature-shaper
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-linux-arm64 ./cmd/feature-shaper
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-darwin-amd64 ./cmd/feature-shaper
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../../dist/feature-shaper-darwin-arm64 ./cmd/feature-shaper
      - name: Create archives
        run: |
          cd dist
          zip feature-shaper-windows-amd64.zip feature-shaper-windows-amd64.exe
          zip feature-shaper-windows-arm64.zip feature-shaper-windows-arm64.exe
          tar -czvf feature-shaper-linux-amd64.tar.gz feature-shaper-linux-amd64
          tar -czvf feature-shaper-linux-arm64.tar.gz feature-shaper-linux-arm64
          tar -czvf feature-shaper-darwin-amd64.tar.gz feature-shaper-darwin-amd64
          tar -czvf feature-shaper-darwin-arm64.tar.gz feature-shaper-darwin-arm64
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
